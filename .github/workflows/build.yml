name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libffi-dev libssl-dev libltdl-dev libncurses6 libncursesw6 zlib1g-dev pkg-config autoconf automake libtool openjdk-17-jdk pipx
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          pipx install buildozer
          pipx install cython

      - name: Build with Auto-Accept Licenses
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PyWebman-APK
          path: bin/*.apk

name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev libffi-dev libssl-dev libltdl-dev libncurses6 libncursesw6 zlib1g-dev pkg-config autoconf automake libtool openjdk-17-jdk
          pip3 install --user --upgrade buildozer cython

      - name: Auto-accept Android SDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # This forces yes to all licenses before buildozer triggers its own download
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n244ac70ef8e40f56572a17f1f464f068124c4c75\n504667f4c0de7af1a06de9f4b1727b84351f2910\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Set script permissions
        run: chmod +x build_apk.sh

      - name: Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          ./build_apk.sh
          

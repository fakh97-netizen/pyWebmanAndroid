name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev libffi-dev libssl-dev libltdl-dev libncurses6 libncursesw6 zlib1g-dev pkg-config autoconf automake libtool
          pip3 install --user --upgrade buildozer cython

      - name: Set script permissions
        run: chmod +x build_apk.sh

      - name: Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          ./build_apk.sh
